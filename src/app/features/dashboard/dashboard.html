<section class="dashboard" aria-labelledby="dashboard-title">
  <div class="dashboard-header">
    <div>
      <p class="section-kicker">Resumen operativo</p>
      <h2 id="dashboard-title">Dashboard</h2>
    </div>
    <p class="dashboard-copy">
      Vista inicial con indicadores estáticos para preparar la base del sistema.
    </p>
  </div>

  <div class="summary-grid" aria-label="Indicadores principales">
    @for (card of summaryCards; track card.id) {
      <article class="summary-card">
        <p class="summary-label">{{ card.label }}</p>
        <strong class="summary-value">{{ card.value }}</strong>
        <p class="summary-detail">{{ card.detail }}</p>
      </article>
    }
  </div>
</section>
