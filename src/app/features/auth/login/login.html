<main class="login-page" aria-labelledby="login-title">
  <section class="login-panel">
    <div class="login-heading">
      <span class="brand-mark" aria-hidden="true">P</span>
      <div>
        <p class="eyebrow">Sistema de gestión</p>
        <h1 id="login-title">Iniciar sesión</h1>
      </div>
    </div>

    <form class="login-form" [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <div class="form-field">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          [attr.aria-invalid]="hasFieldError('username')"
          aria-describedby="username-error"
        />
        @if (hasFieldError('username')) {
          <p class="field-error" id="username-error">Ingresa el usuario.</p>
        }
      </div>

      <div class="form-field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          [attr.aria-invalid]="hasFieldError('password')"
          aria-describedby="password-error"
        />
        @if (hasFieldError('password')) {
          <p class="field-error" id="password-error">Ingresa la contraseña.</p>
        }
      </div>

      @if (errorMessage()) {
        <p class="login-error" role="alert">{{ errorMessage() }}</p>
      }

      <button class="submit-button" type="submit" [disabled]="isLoading()">
        @if (isLoading()) {
          Enviando...
        } @else {
          Iniciar sesión
        }
      </button>
    </form>
  </section>
</main>
